name: Python CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run AI Log Prediction
        run: |
          python3 -m app.main
          # Warn if risky log detected (do NOT fail build)
          python3 -c "
import pandas as pd
from app.model import train_model, predict_log

model, vectorizer = train_model()

with open('logs/sample.log') as f:
    lines = f.readlines()

risky_found = False
for line in lines:
    pred, prob = predict_log(line.strip(), model, vectorizer)
    if pred == 1:
        risky_found = True
        print(f'WARNING: Risky log detected: {line.strip()} (Confidence: {prob:.2f})')

if not risky_found:
    print('No risky logs detected.')
"
